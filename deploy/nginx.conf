# Nginx reverse proxy / load balancer for the NEPSE AI platform (Phase 8).
#
# Terminates TLS, load-balances across stateless FastAPI replicas, proxies the
# WebSocket upgrade, and applies edge rate limiting + security headers. Point it
# at multiple `api` containers (e.g. `docker compose up --scale api=4`).

# --- Upstreams (stateless API replicas; add as many as you scale to) --------
upstream nepse_api {
    least_conn;                 # spread load by active connections
    server api:8000 max_fails=3 fail_timeout=15s;
    # server api2:8000;         # additional replicas
    keepalive 32;
}

# --- Edge rate limiting (defense in depth; app also rate-limits per-user) ----
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

server {
    listen 80;
    server_name _;
    # Redirect all plaintext traffic to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers at the edge (the app sets these too — belt and braces).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 2m;

    # REST API
    location /api/ {
        limit_req zone=api_rl burst=40 nodelay;
        limit_conn api_conn 50;

        proxy_pass http://nepse_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket stream (sticky not required — each replica has its own Redis sub)
    location /ws/ {
        proxy_pass http://nepse_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # long-lived sockets
    }

    location /health {
        proxy_pass http://nepse_api;
        access_log off;
    }
}
