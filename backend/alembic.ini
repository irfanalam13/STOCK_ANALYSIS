# Alembic configuration for the NEPSE trading backend.
#
# The database URL is NOT set here — env.py reads it from core.config.settings
# (settings.DATABASE_URL_SYNC) so there is a single source of truth and no
# credentials live in version control.
#
#   alembic upgrade head        # apply migrations
#   alembic downgrade -1        # roll back one
#   alembic revision --autogenerate -m "message"
[alembic]
script_location = alembic
prepend_sys_path = .
# Use a path-friendly, sortable filename + slug for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
