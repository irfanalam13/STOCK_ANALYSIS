# Full-stack orchestration: Postgres + Redis + API + Celery worker/beat + frontend.
#
#   cp backend/.env.example backend/.env   # set a real SECRET_KEY
#   docker compose up --build
#
# Frontend -> http://localhost:3000   API/docs -> http://localhost:8000/docs
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nepse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nepse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nepse_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nepse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    # Market-data pipeline (default queue) + low-priority analytics/fraud/logs.
    command: celery -A celery_tasks.worker.celery_app worker -Q celery,low-priority --loglevel=info
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  alerts-worker:
    build: ./backend
    # Phase 6/8: high-priority alert evaluation + notification dispatch + email.
    # Scale horizontally with `docker compose up --scale alerts-worker=N`.
    command: >
      celery -A celery_tasks.worker.celery_app worker
      -Q alert-evaluation-queue,notification-send-queue,email-delivery-queue
      --loglevel=info
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A celery_tasks.worker.celery_app beat --loglevel=info
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - redis

  ml:
    build: ./ml_service
    command: uvicorn app:app --host 0.0.0.0 --port 8100
    env_file: ./ml_service/.env
    environment:
      REDIS_HOST: redis
      REDIS_DB: "1"
      USE_DB: "true"
      POSTGRES_HOST: postgres
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked at build time — must be reachable from the user's BROWSER.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/market
        NEXT_PUBLIC_ML_API_URL: http://localhost:8100
    ports:
      - "3000:3000"
    depends_on:
      - api
      - ml

volumes:
  pgdata:
